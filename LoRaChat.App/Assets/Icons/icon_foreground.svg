<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="456" height="456" viewBox="0 0 456 456" version="1.1"
     xmlns="http://www.w3.org/2000/svg">
  <!-- LoRaChat mesh-node mark: a central hub linked to three peer nodes (one active/green),
       evoking a LoRa mesh. Kept within the center safe zone for Android adaptive icons. -->
  <g fill="none" stroke="#22d3ee" stroke-linecap="round">
    <!-- outer mesh edges (faint) -->
    <path opacity="0.30" stroke-width="5"
          d="M228 123 L137 288 M228 123 L319 288 M137 288 L319 288" />
    <!-- hub links (bright) -->
    <path opacity="0.80" stroke-width="8"
          d="M228 228 L228 123 M228 228 L137 288 M228 228 L319 288" />
  </g>

  <!-- peer nodes -->
  <circle cx="228" cy="123" r="20" fill="#22d3ee" />
  <circle cx="137" cy="288" r="20" fill="#22d3ee" />
  <circle cx="319" cy="288" r="20" fill="#4ade80" />

  <!-- central hub -->
  <circle cx="228" cy="228" r="36" fill="#22d3ee" />
  <circle cx="228" cy="228" r="17" fill="#08222b" />
</svg>
