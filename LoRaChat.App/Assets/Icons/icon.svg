<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="456" height="456" viewBox="0 0 456 456" version="1.1"
     xmlns="http://www.w3.org/2000/svg">
  <!-- LoRaChat app-icon background: tactical dark with a subtle cyan core glow. The mesh glyph
       (icon_foreground.svg) is composited on top by Uno.Resizetizer. -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="44%" r="62%">
      <stop offset="0%"  stop-color="#123842" />
      <stop offset="52%" stop-color="#0f141a" />
      <stop offset="100%" stop-color="#080b0e" />
    </radialGradient>
  </defs>
  <rect x="0" y="0" width="456" height="456" fill="url(#bg)" />
</svg>
